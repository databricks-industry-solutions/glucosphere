command: ["python", "app.py"]
env:
  # All env vars use plain `value:` — `valueFrom: <resource-name>` was tried
  # but the app object's `resources` field came back empty after deploy
  # (verified via /api/2.0/apps/glucosphere-dashboard on 2026-05-18), so
  # valueFrom references can't resolve → ENDPOINT_NAME and GENIE_SPACE_ID
  # came up empty at runtime, causing 500 errors from Clinical Analysis
  # and Genie Natural-Language Query panels. Hardcoded IDs work reliably.
  # render_app_yaml.py rewrites these per-target.
  - name: ENDPOINT_NAME
    value: "mas-94acba91-endpoint"
  - name: GENIE_SPACE_ID
    value: "01f150850a66184ba68fb1b26f092287"
  - name: CATALOG_NAME
    value: "mmt_aws_usw2_catalog"
  - name: SCHEMA_NAME
    value: "glucosphere_dev"
resources:
  - name: mas-endpoint
    description: "Multi-Agent Supervisor serving endpoint"
    serving_endpoint:
      name: mas-94acba91-endpoint
      permission: CAN_QUERY
  - name: ka-endpoint
    description: "WHO Knowledge Assistant serving endpoint"
    serving_endpoint:
      name: ka-9d3b46f9-endpoint
      permission: CAN_QUERY
  - name: sql-warehouse
    description: "SQL warehouse for CGM data queries"
    sql_warehouse:
      id: dafc5dff8eb8094a
      permission: CAN_USE
  - name: genie-space
    description: "Genie space for CGM intelligence queries (ENV GENIE_SPACE_ID resolves from here)"
    genie_space:
      id: 01f150850a66184ba68fb1b26f092287
      permission: CAN_RUN
