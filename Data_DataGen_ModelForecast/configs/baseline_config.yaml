dev:
  baseline_table_name: diabetes_data
  num_pseudo: 1000
  seed: 7
  seg_days: 7
  stride_days: 2
  cadence_min: 5
  gap_min: 15
  max_windows_per_source: 50
  train_sample_frac: 0.3
  shift_jitter_min: 120
  allow_reflective_padding: false
  min_glucose_coverage: 0.9
  interp_max_gap_points: 6
  gain_lo: 0.9
  gain_hi: 1.2
  alpha_ins: 7.0
  alpha_carb: 10.0
  alpha_steps: 2.0
  alpha_hr: 0.0
  alpha_cal: 0.0
  glucose_offset: 8.0
  carb_mult_lo: 0.95
  carb_mult_hi: 1.1
  bolus_mult_lo: 0.95
  bolus_mult_hi: 1.1
  incident_pct: 0.3
  calibration_bias_mgdl: 40.0                # kept for backwards-compat with original 05_*.py runtime backup
  # Two-incident mirror design (2026-05-18 — consumed by 05_incident_inference_bidirectional.py):
  # Window 1 is the original buildathon-main +40 incident (Day 2 14:00-17:00, 30% of fleet).
  # Window 2 mirrors it on Day 5 10:00-13:00 with -40 bias on a DIFFERENT 30% cohort
  # (mutually exclusive from Window 1), so plots show two clearly distinct spikes at
  # different x-positions without any direction-split cancellation.
  calibration_bias_magnitude_mgdl: 40.0      # absolute bias size (same value as legacy calibration_bias_mgdl)
  calibration_bias_direction_split: 1.0      # WITHIN window 1 only — kept at 1.0 (all-positive) now that
                                             # we have a dedicated negative-direction window 2.
  incident_start_day: 2
  incident_start_hour: 14
  incident_duration_min: 180
  # Second (mirror) incident window — opposite direction, different cohort:
  second_incident_pct: 0.3                   # 30% of fleet (mutually exclusive from window 1's 30%)
  second_incident_start_day: 5               # Day 5 = 2026-01-10
  second_incident_start_hour: 10             # 10:00 AM (different time-of-day from window 1's 14:00)
  second_incident_duration_min: 180          # 3 hours (matches window 1)
  second_incident_direction: negative        # 'negative' = -bias_magnitude, 'positive' = +bias_magnitude
  demo_week_start: '2026-01-05'
  lags: 12
  roll_windows:
  - 3
  - 6
  - 12
  max_depth: 7
  eta: 0.05
  subsample: 0.8
  colsample: 0.8
  n_rounds: 2000
  early_stop: 50
  mlflow_experiment: ""
  uc_model_name_15m: cgm_xgb_15m
  uc_model_name_30m: cgm_xgb_30m
staging:
  num_pseudo: 5000
  train_sample_frac: 0.5
  n_rounds: 1000
  early_stop: 100
prod:
  num_pseudo: 10000
  train_sample_frac: 1.0
  max_depth: 8
  eta: 0.05
  subsample: 0.9
  colsample: 0.9
  n_rounds: 2000
  early_stop: 150
