bundle:
  name: glucosphere

variables:
  catalog:
    description: Unity Catalog catalog name (override per target). The default is a generic placeholder name that any new deployment can create; each named target in `targets:` below sets its own workspace-specific catalog.
    default: glucosphere_catalog
  schema:
    description: Schema / database name
    default: glucosphere_dev
  volume:
    description: UC Volume name for the landing-zone data feeding the DLT pipeline
    default: landing_zone
  baseline_source:
    description: |
      Which baseline ingest path the job runs at the head of the pipeline.
      Valid: "synthetic" | "real_from_source" | "real_from_table".
      Validated upfront by validate_baseline_source task (typos fail fast).
        - synthetic        → dual_01_generate_synthetic_baseline.py (textbook phenotypes + AR(1))
        - real_from_source → dual_01_ingest_real_baseline.py downloads HUPA-UCM from Mendeley
        - real_from_table  → dual_01_ingest_real_baseline.py copies from ${source_catalog}.${source_schema}.${source_table}
      Default is real_from_source (changed 2026-05-16) — buildathon demos want
      clinical realism (hypoglycemia events, hyperglycemia outliers up to ~450 mg/dL),
      and the Mendeley URL has been reliable. Synthetic remains one --var away for
      CI / restricted-egress scenarios.
    default: real_from_source
  source_catalog:
    description: Source catalog for baseline_source=real_from_table mode (empty otherwise)
    default: ""
  source_schema:
    description: Source schema for baseline_source=real_from_table mode (empty otherwise)
    default: ""
  source_table:
    description: Source table for baseline_source=real_from_table mode (empty otherwise)
    default: ""
  app_name:
    description: Name of the Databricks App
    default: glucosphere-dashboard
  warehouse_id:
    description: SQL warehouse ID used for data queries and permission grants
    default: d9af05523dafe3a6   # HLS AMER SQL Warehouse on fe-vm-hls-amer

targets:
  hls_amer:
    default: true
    workspace:
      host: https://fe-vm-hls-amer.cloud.databricks.com
    variables:
      catalog: hls_amer_catalog

  # ─── Template for adding your own target ──────────────────────────────────
  # Copy the block below, uncomment, and replace the four placeholder values
  # with your workspace's host + catalog + schema + warehouse_id. The two
  # active targets above (`hls_amer`, `mmt_aws_usw2`) serve as working examples.
  #
  # Historical Ward-branch targets (`ward_consolidated`, `azure`, `azure2`)
  # were removed 2026-05-19 — their workspace-specific hardcoded values are
  # not portable (specific to Justin's deploys on
  # `origin/feature/ward-app-cleanup-upstream`, where they remain
  # authoritative). Note that `deploy.py` may still reference `ward_consolidated`
  # as a hardcoded target name; flagged for cleanup under task #69.
  #
  # my_target_name:
  #   workspace:
  #     host: https://<your-workspace>.cloud.databricks.com
  #   variables:
  #     catalog: <your-catalog>
  #     schema: <your-schema>
  #     warehouse_id: <your-warehouse-id>

  # Backup / portability-test target on May's personal MMT workspace.
  # Has plenty of app-cap headroom (1/100 used) so unblocked from the
  # fe-vm-hls-amer cap issue. No frozen reference catalogs here — only
  # synthetic or HUPA-UCM-download baseline modes will work.
  mmt_aws_usw2:
    workspace:
      host: https://fevm-mmt-aws-usw2.cloud.databricks.com
    variables:
      catalog: mmt_aws_usw2_catalog
      schema: glucosphere_dev
      warehouse_id: dafc5dff8eb8094a   # Serverless Starter Warehouse (Small)

resources:

  # ---------------------------------------------------------------------------
  # DLT Pipeline: Silver & Gold CGM Views
  # Reads from landing_zone volume (populated by setup job) and produces:
  #   silver_patient_registry, silver_device_telemetry_stream,
  #   silver_patient_readings, gold_patient_device_readings
  # ---------------------------------------------------------------------------
  pipelines:
    cgm_silver_gold:
      name: glucosphere-cgm-silver-gold-${bundle.target}
      catalog: ${var.catalog}
      target: ${var.schema}
      channel: CURRENT
      continuous: false
      serverless: true
      libraries:
        - file:
            path: Data_DataGen_ModelForecast/utils/additional_patient_info/transformations.sql
      configuration:
        catalog: ${var.catalog}
        schema: ${var.schema}

  # ---------------------------------------------------------------------------
  # Job: End-to-End Glucosphere Setup
  #
  # Task DAG (ASCII):
  #
  #   validate_baseline_source       (enum + banner — fail-fast typo guard)
  #            ↓
  #   check_pre_baseline_grants      (verify catalog/schema/table/volume/function perms before any work)
  #            ↓
  #   dispatch_baseline_source       (condition_task: == "synthetic"?)
  #            ↓                ↓
  #    true ↙               ↘ false
  #   generate_synthetic_   ingest_real_baseline    (writes diabetes_data
  #     baseline             [+ baseline_timeseries  + baseline_timeseries
  #                          + baseline_windows_     + baseline_windows_
  #                          metadata via C.4 port]   metadata]
  #            ↘                 ↙
  #   sanity_summary             (run_if AT_LEAST_ONE_SUCCESS;
  #                               asserts diabetes_data non-empty + plausible)
  #            ↓
  #   datagen_modeling           (04_*: pseudo CGM data + XGBoost training)
  #            ↓
  #   incident_inference         (05_*: device calibration bug + inference)
  #            ↓                            ↓
  #   deploy_model_endpoints       generate_patient_device_data
  #            ↓                       ↓                ↓
  #            ↘            create_patient_registry  create_device_telemetry
  #             ↘                      ↓
  #              ↘             run_dlt_pipeline      (silver/gold from landing_zone)
  #               ↘                    ↓
  #                ↘          create_genie_ka_mas    (KA + Genie + MAS endpoints)
  #                 ↘                  ↓
  #                  ↘    check_post_endpoint_grants (verify KA/MAS/Genie exist before grant_app_permissions)
  #                   ↘                ↓
  #                    ↘     grant_app_permissions  (app SP access on UC + endpoints)
  # ---------------------------------------------------------------------------
  jobs:
    glucosphere_full_setup:
      name: glucosphere-full-setup-${bundle.target}
      environments:
        - environment_key: default
          spec:
            client: "1"
      tasks:
        # ── Preflight: validate baseline_source + print run banner ─────────
        - task_key: validate_baseline_source
          description: Validate baseline_source enum + print run banner (fail-fast on typos)
          max_retries: 0
          notebook_task:
            notebook_path: Data_DataGen_ModelForecast/utils/dual_validate_baseline_source.py
            base_parameters:
              BASELINE_SOURCE: ${var.baseline_source}
              CATALOG_NAME:    ${var.catalog}
              SCHEMA_NAME:     ${var.schema}
              SOURCE_CATALOG:  ${var.source_catalog}
              SOURCE_SCHEMA:   ${var.source_schema}
              SOURCE_TABLE:    ${var.source_table}
          environment_key: default

        # ── Pre-baseline grants check ──────────────────────────────────────
        - task_key: check_pre_baseline_grants
          description: Verify UC permissions needed by baseline + modeling tasks (fail-fast on missing grants)
          max_retries: 0
          depends_on:
            - task_key: validate_baseline_source
          notebook_task:
            notebook_path: Data_DataGen_ModelForecast/utils/dual_check_pre_baseline_grants.py
            base_parameters:
              CATALOG_NAME: ${var.catalog}
              SCHEMA_NAME:  ${var.schema}
          environment_key: default

        # ── Baseline ingest dispatch ───────────────────────────────────────
        - task_key: dispatch_baseline_source
          description: Branch on ${var.baseline_source} — synthetic vs real baseline ingest
          depends_on:
            - task_key: check_pre_baseline_grants
          condition_task:
            op: EQUAL_TO
            left: ${var.baseline_source}
            right: "synthetic"

        - task_key: generate_synthetic_baseline
          description: Generate synthetic baseline CGM data (diabetes_data + baseline_timeseries)
          max_retries: 0
          depends_on:
            - task_key: dispatch_baseline_source
              outcome: "true"
          notebook_task:
            notebook_path: Data_DataGen_ModelForecast/dual_01_generate_synthetic_baseline.py
            base_parameters:
              CATALOG_NAME: ${var.catalog}
              SCHEMA_NAME:  ${var.schema}
          environment_key: default

        - task_key: ingest_real_baseline
          description: Ingest real baseline (HUPA-UCM download or existing UC table — sub-option set inside notebook)
          max_retries: 0
          depends_on:
            - task_key: dispatch_baseline_source
              outcome: "false"
          notebook_task:
            notebook_path: Data_DataGen_ModelForecast/dual_01_ingest_real_baseline.py
            base_parameters:
              CATALOG_NAME:    ${var.catalog}
              SCHEMA_NAME:     ${var.schema}
              BASELINE_SOURCE: ${var.baseline_source}
              SOURCE_CATALOG:  ${var.source_catalog}
              SOURCE_SCHEMA:   ${var.source_schema}
              SOURCE_TABLE:    ${var.source_table}
          environment_key: default

        # ── Sanity gate before heavy downstream modeling ───────────────────
        - task_key: sanity_summary
          description: Assert diabetes_data is non-empty + plausible before modeling
          max_retries: 0
          depends_on:
            - task_key: generate_synthetic_baseline
            - task_key: ingest_real_baseline
          run_if: AT_LEAST_ONE_SUCCESS
          notebook_task:
            notebook_path: Data_DataGen_ModelForecast/utils/dual_sanity_summary.py
            base_parameters:
              CATALOG_NAME: ${var.catalog}
              SCHEMA_NAME:  ${var.schema}
          environment_key: default

        - task_key: datagen_modeling
          description: Generate synthetic CGM data and train XGBoost glucose forecast models
          max_retries: 0
          depends_on:
            - task_key: sanity_summary
          notebook_task:
            notebook_path: Data_DataGen_ModelForecast/dual_04_CGM_PseudoGeneration_CleanData_Modeling.py
            base_parameters:
              CATALOG_NAME: ${var.catalog}
              SCHEMA_NAME:  ${var.schema}
              ENV: dev
              RUN_OPTUNA_TUNING: "false"
          environment_key: default

        - task_key: incident_inference
          description: >
            Simulate device calibration bug incident, run inference,
            and produce pseudo_incident_7d_labeled table consumed by app.
            Switched to dual_05 bidirectional variant 2026-05-17 (#41 Option 3
            side-by-side); original 05_*.py retained as runtime backup —
            revert by changing notebook_path below back to 05_*.py.
          max_retries: 0
          depends_on:
            - task_key: datagen_modeling
          notebook_task:
            notebook_path: Data_DataGen_ModelForecast/dual_05_CGM_Incident_Inference_DeviceCalibrationBug_Bidirectional.py
            base_parameters:
              CATALOG_NAME:     ${var.catalog}
              SCHEMA_NAME:      ${var.schema}
              ENV: dev
              INCLUDE_INCIDENT: "true"
          environment_key: default

        - task_key: deploy_model_endpoints
          description: Deploy XGBoost 15m and 30m forecast models as serving endpoints
          max_retries: 0
          depends_on:
            - task_key: datagen_modeling
          notebook_task:
            notebook_path: Data_DataGen_ModelForecast/dual_06_DeployModel_as_ServingEndpoint.py
            base_parameters:
              CATALOG_NAME: ${var.catalog}
              SCHEMA_NAME:  ${var.schema}
          environment_key: default

        # ── Landing Zone Population ────────────────────────────────────────
        # generate_patient_device_data must run first — it creates the patient_device
        # table (from pseudo_incident_7d_labeled) that the registry and telemetry
        # notebooks depend on for patient/device IDs.
        - task_key: generate_patient_device_data
          description: Create patient_device table from pseudo_incident_7d_labeled
          max_retries: 0
          depends_on:
            - task_key: incident_inference
          notebook_task:
            notebook_path: Data_DataGen_ModelForecast/utils/additional_patient_info/Create Patient_Device Table.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema:  ${var.schema}
          environment_key: default

        - task_key: create_patient_registry
          description: Generate synthetic patient registry parquet files into landing_zone volume
          max_retries: 0
          depends_on:
            - task_key: generate_patient_device_data
          notebook_task:
            notebook_path: Data_DataGen_ModelForecast/utils/additional_patient_info/Create Raw Patient_Registry Data.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema:  ${var.schema}
          environment_key: default

        - task_key: create_device_telemetry
          description: Generate synthetic device telemetry parquet files into landing_zone volume
          max_retries: 0
          depends_on:
            - task_key: generate_patient_device_data
          notebook_task:
            notebook_path: Data_DataGen_ModelForecast/utils/additional_patient_info/Create Raw Device Data.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema:  ${var.schema}
          environment_key: default

        # ── DLT Pipeline ──────────────────────────────────────────────────
        - task_key: run_dlt_pipeline
          description: Run DLT pipeline to produce silver/gold CGM tables from landing_zone
          max_retries: 0
          depends_on:
            - task_key: create_patient_registry
            - task_key: create_device_telemetry
            - task_key: deploy_model_endpoints
          pipeline_task:
            pipeline_id: ${resources.pipelines.cgm_silver_gold.id}
            full_refresh: false

        # ── Intelligence Layer ────────────────────────────────────────────
        - task_key: create_genie_ka_mas
          description: Create WHO Knowledge Assistant, Genie room, and Multi-Agent Supervisor endpoint
          max_retries: 0
          depends_on:
            - task_key: run_dlt_pipeline
          notebook_task:
            notebook_path: Data_DataGen_ModelForecast/dual_09_Create_Genie_KA_MAS.py
            base_parameters:
              CATALOG_NAME:      ${var.catalog}
              SCHEMA_NAME:       ${var.schema}
              KA_NAME:           "Glucosphere-Knowledge-Assistant"
              GENIE_NAME:        "Glucosphere CGM Intelligence"
              MAS_NAME:          "Glucosphere-Supervisor"
          environment_key: default

        # ── Post-endpoint grants check ────────────────────────────────────
        - task_key: check_post_endpoint_grants
          description: Verify KA + MAS + Genie resources exist before grant_app_permissions runs
          max_retries: 0
          depends_on:
            - task_key: create_genie_ka_mas
          notebook_task:
            notebook_path: Data_DataGen_ModelForecast/utils/dual_check_post_endpoint_grants.py
            base_parameters:
              CATALOG_NAME: ${var.catalog}
              SCHEMA_NAME:  ${var.schema}
              KA_NAME:      "Glucosphere-Knowledge-Assistant"
              MAS_NAME:     "Glucosphere-Supervisor"
              GENIE_NAME:   "Glucosphere CGM Intelligence"
          environment_key: default

        # ── Permissions ───────────────────────────────────────────────────
        - task_key: grant_app_permissions
          description: >
            Grant the deployed app's service principal access to the catalog,
            all serving endpoints, and the Genie space
          max_retries: 0
          depends_on:
            - task_key: check_post_endpoint_grants
          notebook_task:
            notebook_path: Data_DataGen_ModelForecast/dual_10_Grant_App_Permissions.py
            base_parameters:
              CATALOG_NAME:      ${var.catalog}
              SCHEMA_NAME:       ${var.schema}
              APP_NAME:          ${var.app_name}
              WAREHOUSE_ID:      ${var.warehouse_id}
              # Endpoint names and Genie space ID are auto-discovered from
              # the workspace if left empty, or can be set explicitly here.
              MAS_ENDPOINT_NAME: ""
              KA_ENDPOINT_NAME:  ""
              GENIE_SPACE_ID:    ""
          environment_key: default

    # -------------------------------------------------------------------------
    # Standalone analytics — distribution comparison across baseline modes
    # -------------------------------------------------------------------------
    # On-demand: operator triggers when ≥2 baseline modes have been populated
    # (e.g. live synthetic + a real_from_source sandbox snapshot, or two real
    # snapshots from different sources). NOT part of glucosphere_full_setup.
    glucosphere_distribution_comparison:
      name: glucosphere-distribution-comparison-${bundle.target}
      description: |
        Compare diabetes_data distributions across baseline modes side-by-side.
        Emits headline stats (n, percentiles, glycemic buckets) + KS test +
        matplotlib plots (overlaid histograms, boxplot, bucket bars). Plots
        embed inline in cell output AND save to a UC Volume.

        Operator MUST set at least 2 of {SYNTHETIC_SCHEMA, REAL_FROM_SOURCE_SCHEMA,
        REAL_FROM_TABLE_SCHEMA} to non-empty schema names containing diabetes_data.
        The notebook validates the ≥2 precondition and fails fast otherwise.
      environments:
        - environment_key: default
          spec:
            client: "1"
      tasks:
        - task_key: distribution_comparison
          description: Compute side-by-side stats and render inline plots
          max_retries: 0
          notebook_task:
            notebook_path: Data_DataGen_ModelForecast/dual_02_compare_baseline_modes.py
            base_parameters:
              CATALOG_NAME:             ${var.catalog}
              # Operator must override at least 2 of the next 3 at run time.
              # Defaults are empty so the notebook fails fast if launched
              # without intent (avoids silently comparing the live schema
              # against itself with a misleading "synthetic" label).
              SYNTHETIC_SCHEMA:         ""
              REAL_FROM_SOURCE_SCHEMA:  ""
              REAL_FROM_TABLE_SCHEMA:   ""
              # Optional: archive the comparison summary as a delta table.
              WRITE_SUMMARY_TO_SCHEMA:  ""
              # Plots: written under the live schema's `comparison_plots`
              # volume (auto-created by the notebook if missing).
              PLOTS_OUTPUT_VOLUME_PATH: /Volumes/${var.catalog}/${var.schema}/comparison_plots
          environment_key: default

  # ---------------------------------------------------------------------------
  # Lakebase: OLTP alert state cache (Plan's Commit F — #42)
  # ---------------------------------------------------------------------------
  # Postgres-managed instance hosting the live alert lifecycle tables (alerts +
  # alert_transitions). Consumed by the Flask app for sub-100ms reads/writes
  # against mutable row state — Delta's lakehouse semantics are awkward for
  # OLTP-style alert acknowledge / resolve workflows.
  #
  # Capacity CU_1 (smallest) — autoscale can be enabled later if read latency
  # demands. node_count defaults to 1 (primary only, no read replicas).
  # retention_window_in_days defaults to 7 (sufficient for demo / development).
  #
  # Sizing rule: feedback_smallest_nonnegotiable_compute applies — start small,
  # escalate only on demonstrated workload need.
  database_instances:
    glucosphere_oltp:
      # Lakebase requires DNS-compliant names (alphanumeric + hyphens only).
      # Cannot use `${bundle.target}` directly because targets use underscores
      # (e.g. `mmt_aws_usw2`). Hardcoded hyphenated form per target.
      # When adding new targets, override this in the target's variables block.
      name: glucosphere-oltp-mmt-aws-usw2
      capacity: CU_1
      # enable_pg_native_login defaults to false — connection uses Databricks
      # OAuth credentials (app SP). Flip to true if a password-based Postgres
      # client is needed for debug / migrations.

  # ---------------------------------------------------------------------------
  # App: Glucosphere Dashboard
  # ---------------------------------------------------------------------------
  apps:
    glucosphere_dashboard:
      name: ${var.app_name}
      description: >
        Glucosphere CGM Intelligence Dashboard — continuous glucose monitoring
        platform with AI-powered diabetes coach insights, device anomaly detection,
        and fleet-level incident analysis.
      source_code_path: App/databricks
